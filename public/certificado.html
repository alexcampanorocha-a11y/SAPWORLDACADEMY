<!DOCTYPE html>
<html>
<head>
  <title>Resultado</title>
</head>
<body>

<h1>Resultado del Certificado</h1>
<div id="resultado"></div>

<script>
const params = new URLSearchParams(window.location.search);
const codigo = params.get("codigo");

fetch(`/certificado/${codigo}`)
.then(res => res.json())
.then(data => {
  if (data.valido) {
    const c = data.data;
    document.getElementById("resultado").innerHTML = `
      <h2>✅ VÁLIDO</h2>
      <p>Nombre: ${c.nombre}</p>
      <p>Curso: ${c.curso}</p>
      <p>Horas: ${c.horas}</p>
      <p>Nota: ${c.nota}</p>
    `;
  } else {
    document.getElementById("resultado").innerHTML = "❌ No válido";
  }
});
</script>

</body>
</html>
